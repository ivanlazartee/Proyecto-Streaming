<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/perfiles.css" />
    <title>OnDev+</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <div class="logo">
        <div class="logo-dot"></div>
        OnDev+
      </div>
    </nav>

    <main>
      <h1>¿Quién está mirando?</h1>

      <div class="profiles-grid">
        <a class="profile-item" href="./ivan.html">
          <div class="avatar avatar-1 crop-1">
            <img src="../assets/img/el-y-ella.avif" alt="Iván" />
          </div>
          <span class="profile-name">Iván</span>
        </a>

        <a class="profile-item" href="./mariano.html">
          <div class="avatar avatar-2 crop-2">
            <img src="../assets/img/el-y-ella.avif" alt="Mariano" />
          </div>
          <span class="profile-name">Mariano</span>
        </a>

        <a class="profile-item" href="./pilar.html">
          <div class="avatar avatar-3 crop-3">
            <img src="../assets/img/el-y-ella.avif" alt="Pilar" />
          </div>
          <span class="profile-name">Pilar</span>
        </a>

        <a class="profile-item" href="#">
          <div class="avatar avatar-4 crop-4">
            <img src="../assets/img/el-y-ella.avif" alt="Peques" />
            <span class="kids-badge">Niños</span>
          </div>
          <span class="profile-name">Peques</span>
        </a>

        <a class="profile-item add-profile" href="#">
          <div class="avatar">
            <div class="add-icon">+</div>
          </div>
          <span class="profile-name">Agregar perfil</span>
        </a>
      </div>

      <button class="manage-btn">Administrar perfiles</button>
    </main>
  </body>
</html>
